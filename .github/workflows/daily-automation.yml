name: Daily Automation Trigger

# ⚠️ IMPORTANT: GitHub disables scheduled workflows after 60 days of repository inactivity.
# To prevent this, a weekly keep-alive workflow (.github/workflows/keep-alive.yml) runs every Monday.
# If this workflow gets disabled, manually trigger it once to re-enable it, or make any commit to the repo.

on:
  schedule:
    # Run at 01:57 UTC daily (3 minutes before internal cron to wake up Railway)
    - cron: '57 1 * * *'
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  trigger-automation:
    runs-on: ubuntu-latest
    # Continue even if Railway is down - we want to wake it up
    continue-on-error: true
    
    steps:
    - name: Wake up Railway and trigger automation
      run: |
        echo "🚀 Triggering daily automation at $(date -u)"
        echo "This will wake up Railway and run the full automation suite"
        
        # Set timeout to prevent hanging
        timeout=120
        
        # Call the automation endpoint with timeout
        response=$(curl -s -w "\n%{http_code}" \
          --max-time $timeout \
          -X POST \
          -H "Content-Type: application/json" \
          https://microplastics-pulse-backend-production.up.railway.app/api/admin/trigger-automation 2>&1) || curl_exit_code=$?
        
        # Check if curl itself failed (connection error, timeout, etc.)
        if [ -n "$curl_exit_code" ]; then
          echo "⚠️  Warning: Curl failed with exit code $curl_exit_code"
          echo "This might mean Railway is sleeping. The request may have woken it up."
          echo "Response received: $response"
          # Don't fail - Railway might be waking up
          exit 0
        fi
        
        # Extract response body and status code
        http_code=$(echo "$response" | tail -n1)
        response_body=$(echo "$response" | head -n -1)
        
        echo "📋 Response Status: $http_code"
        echo "📋 Response Body: $response_body"
        
        # Check if successful (200 = full success, 207 = partial success)
        if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 207 ]; then
          echo "✅ Automation completed successfully!"
          
          # Parse and display results if possible
          if command -v jq &> /dev/null && echo "$response_body" | jq -e . >/dev/null 2>&1; then
            echo "📊 Automation Details:"
            echo "$response_body" | jq -r '.details | to_entries[] | "  \(.key): \(.value.status) - \(.value.details)"' 2>/dev/null || echo "  (Could not parse details)"
          fi
        elif [ "$http_code" -eq 000 ] || [ -z "$http_code" ]; then
          echo "⚠️  Warning: No HTTP response received (Railway might be sleeping)"
          echo "The request may have woken Railway up. This is not necessarily a failure."
          exit 0
        elif [ "$http_code" -ge 500 ]; then
          echo "⚠️  Warning: Server error ($http_code) - Railway might be waking up"
          echo "Response: $response_body"
          # Don't fail - server might be starting up
          exit 0
        else
          echo "❌ Automation failed with status $http_code"
          echo "Response: $response_body"
          # Log but don't fail the workflow - we want it to keep running daily
          exit 0
        fi

    - name: Summary
      run: |
        echo "🎯 Daily automation trigger completed"
        echo "⏰ Triggered at: $(date -u)"
        echo "🔗 Backend URL: https://microplastics-pulse-backend-production.up.railway.app"
        echo "📱 Admin Panel: https://microplastics-pulse-frontend.vercel.app/admin"
